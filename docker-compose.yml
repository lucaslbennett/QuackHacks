# Local Postgres for development. Matches the default DATABASE_URL in .env:
#   postgresql://postgres:postgres@localhost:5432/ai_influencer
#
# Usage:
#   docker compose up -d        # start the database
#   npm run migrate             # apply server/db/schema.sql
#   docker compose down         # stop (add -v to also wipe data)
services:
  db:
    image: postgres:16-alpine
    container_name: ai_influencer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_influencer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_influencer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
